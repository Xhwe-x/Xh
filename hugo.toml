baseURL = "https://xh-1x3.pages.dev"
languageCode = "zh-cn"
title = "Xavier的个人博客"
theme = "kawaii"

enableEmoji = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.147.0"

[pagination]
  pagerSize = 6

[build]
  writeStats = true

[params]
  description = "记录 生活 思考"
  author = "Xavier"
  
  theme_toggle = true
  search = false
  favicon = "/favicon.ico"
  
  hero_cta = "查看文章"
  hero_cta_link = "/posts"
  
  footer_description = "一个长期更新的个人博客"
  copyright = " 2026 我的个人博客. All rights reserved."
  
  [[params.social]]
    name = "github"
    url = "https://github.com/Xhwe-x/Xh"
  
  [[params.social]]
    name = "twitter"
    url = "https://x.com/Xavier9823"
  
  [[params.footer_links]]
    name = "作品集"
    url = "我的其他网址"
  
  [[params.footer_links]]
    name = "Download"
    url = "https://github.com/Xhwe-x/Xh"
  
  [[params.featured_sections]]
    title = "思考"
    description = "记录一些关于自己的人生思考及自我反省"
    icon = "✨"
    link = "/posts"
  
  [[params.featured_sections]]
    title = "技术实践"
    description = "分享 Hugo、前端、小工具和效率相关内容"
    icon = "🛠"
    link = "/"
  
  [[params.featured_sections]]
    title = "生活记录"
    description = "把日常想法、阅读和成长过程沉淀下来"
    icon = "☕"
    link = "/about"



[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  
  [[menu.main]]
    name = "文章"
    url = "/posts"
    weight = 20
  
  [[menu.main]]
    name = "相册"
    url = "/gallery"
    weight = 25
    
  [[menu.main]]
    name = "关于我"
    url = "/about"
    weight = 30
    
  [[menu.main]]
    name = "Contact"
    url = "/contact"
    weight = 40

[markup]
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = false
    codeFences = true
    guessSyntax = true
  
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]