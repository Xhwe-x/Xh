baseURL = "https://hugo-kawaii.pages.dev"
languageCode = "en-us"
title = "我的私人博客"
theme = "kawaii"

enableEmoji = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.147.0"

[pagination]
  pagerSize = 6

[build]
  writeStats = true

[params]
  description = "这是我的个人秘密基地，记录生活的"
  author = "Xh"
  
  theme_toggle = true
  search = true
  favicon = "/favicon.ico"
  
  hero_cta = "阅读文章"
  hero_cta_link = "/posts"
  
  footer_description = "在这里分享我的生活"
  copyright = "© 2026 我的私人博客. All rights reserved."
  
  [[params.social]]
    name = "github"
    url = "https://github.com/Xhwe-x/Xh"
  
  [[params.social]]
    name = "twitter"
    url = "https://x.com/Xavier9823"
  
  [[params.footer_links]]
    name = "我的其他网站"
    url = "我的其他网址"
  
  [[params.footer_links]]
    name = "Download"
    url = "https://github.com/Xhwe-x/Xh"
  
  [[params.featured_sections]]
    title = "Beautiful Design"
    description = "Experience modern web design with kawaii aesthetics and smooth animations"
    icon = "✨"
    link = "/posts"
  
  [[params.featured_sections]]
    title = "Developer Friendly"
    description = "Built with Hugo, easy to customize and extend for your needs"
    icon = "⚡"
    link = "https://github.com/yuis-ice/hugo-kawaii#readme"
  
  [[params.featured_sections]]
    title = "Mobile First"
    description = "Responsive design that looks perfect on all devices and screen sizes"
    icon = "📱"

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  
  [[menu.main]]
    name = "文章"
    url = "/posts"
    weight = 20
  
  [[menu.main]]
    name = "相册"
    url = "/gallery"
    weight = 25
    
  [[menu.main]]
    name = "关于我"
    url = "/about"
    weight = 30
    
  [[menu.main]]
    name = "Contact"
    url = "/contact"
    weight = 40

[markup]
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = false
    codeFences = true
    guessSyntax = true
  
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]